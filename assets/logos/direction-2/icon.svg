<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- complift · direction-2 "Dimension Callout" · a component drawn as a measured engineering detail -->
  <rect width="128" height="128" rx="24" fill="#F7F5F0"/>
  <!-- extension lines (thin, ink) -->
  <g stroke="#21211D" stroke-width="3" opacity="0.45">
    <path d="M 30 38 V 16"/>
    <path d="M 94 38 V 16"/>
  </g>
  <!-- dimension line with drafting slash ticks (safety orange) -->
  <g stroke="#E8743B" stroke-width="5" stroke-linecap="round">
    <path d="M 30 22 H 94"/>
    <path d="M 24 28 L 36 16"/>
    <path d="M 88 28 L 100 16"/>
  </g>
  <!-- the measured component (cobalt) -->
  <rect x="30" y="44" width="64" height="64" fill="none" stroke="#1E4FD8" stroke-width="9"/>
  <!-- inner division: component card header line, drawn through -->
  <path d="M 30 66 H 94" stroke="#1E4FD8" stroke-width="9"/>
</svg>
