<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- complift · direction-3 "Layer Peel" · isometric: component tile lifted vertically off the page stack -->
  <rect width="128" height="128" rx="24" fill="#F7F5F0"/>
  <!-- vertical lift guides (dashed, ink) -->
  <g stroke="#21211D" stroke-width="3" stroke-dasharray="6 6" opacity="0.4">
    <path d="M 28 84 V 46"/>
    <path d="M 100 84 V 46"/>
  </g>
  <!-- page stack: two flat iso layers (cobalt outline) -->
  <g fill="#F7F5F0" stroke="#1E4FD8" stroke-width="7" stroke-linejoin="round">
    <path d="M 64 84 L 100 102 L 64 120 L 28 102 Z"/>
    <path d="M 64 66 L 100 84 L 64 102 L 28 84 Z"/>
  </g>
  <!-- lifted component layer (safety orange, ink outline) -->
  <path d="M 64 10 L 100 28 L 64 46 L 28 28 Z" fill="#E8743B" stroke="#21211D" stroke-width="7" stroke-linejoin="round"/>
</svg>
